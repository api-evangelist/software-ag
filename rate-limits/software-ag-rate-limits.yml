specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Software AG
providerId: software-ag
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Management
  - webMethods
  - Rate Limiting
description: Software AG webMethods is customer-deployed (on-prem or cloud) software; rate limits are
  not centrally published numbers but are configured by tenant administrators inside webMethods API Gateway.
  The Service Management API is administrative and runs on the customer's own gateway endpoint.
sources:
  - https://www.softwareag.com/
notes: webMethods API Gateway is customer-hosted. Rate-limit policies (rate, quota, throttling) are configured
  by the customer inside the gateway and depend on cluster sizing. Software AG does not publish a single
  platform-wide rate-limit number applicable across deployments.
responseCodes:
  throttled: 429
limits:
  - name: Customer-configured webMethods API Gateway policies
    scope: account/policy
    metric: varies
    limit: 'see customer-configured API Gateway policy'
policies:
  - name: Customer-deployed gateway
    description: webMethods API Gateway is deployed on the customer's infrastructure. Rate-limit, quota,
      and throttling policies are configured per API in the gateway by the tenant administrator and are
      not visible from a public Software AG limits page.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
