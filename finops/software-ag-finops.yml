specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Software AG
providerId: software-ag
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Management
  - webMethods
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps placeholder for Software AG webMethods. Pricing is contact-sales only,
  and webMethods is typically customer-deployed software; meters here describe the consumption shape
  customers should track to allocate license cost.'
sources:
  - https://www.softwareag.com/
notes: Software AG does not publish a public price sheet, so unit prices and FOCUS PricingUnit cannot
  be reconciled. Meters listed reflect the consumption shape webMethods customers typically negotiate
  against (runtime cores / nodes, calls passing the gateway, environments).
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Software AG
serviceCategory: Enterprise Integration
billingModel:
  pricingCategory: Subscription (Contact Sales)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: webMethods Integration Suite
  ServiceCategory: Enterprise Integration
  ProviderName: Software AG
  PublisherName: Software AG
  InvoiceIssuerName: Software AG
  BillingCurrency: USD
meters:
  - name: gateway_calls
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
  - name: runtime_cores
    unit: core
    aggregation: max
    dimensions:
      - environment
      - cluster
  - name: environments
    unit: environment
    aggregation: count
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use webMethods API Gateway analytics, the Service Management API, and webMethods Integration
      Server logs to surface call volume, latency, and runtime cluster utilization.
  - name: Allocation
    description: Tag APIs and integrations to consuming application teams; map webMethods environments
      (dev/test/prod) to internal cost centers for license recharge.
  - name: Optimization
    description: Right-size Integration Server runtime cores per cluster, retire unused APIs in API Gateway,
      and consolidate environments where contract terms allow.
  - name: Accountability
    description: Platform owner reconciles Software AG license cost against Gateway analytics and runtime
      utilization at each renewal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
