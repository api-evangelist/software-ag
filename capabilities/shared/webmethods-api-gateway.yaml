naftiko: "1.0.0-alpha1"

info:
  label: "webMethods API Gateway"
  description: >-
    Software AG webMethods API Gateway Service Management API for creating,
    managing, activating, and publishing REST, SOAP, WebSocket, and OData APIs.
  tags:
    - API Management
    - Enterprise Integration
    - webMethods
    - Software AG
    - API Gateway
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      WEBMETHODS_API_GATEWAY_USER: WEBMETHODS_API_GATEWAY_USER
      WEBMETHODS_API_GATEWAY_PASSWORD: WEBMETHODS_API_GATEWAY_PASSWORD

capability:
  consumes:
    - type: http
      namespace: webmethods-api-gateway
      baseUri: http://localhost:5555/rest/apigateway
      description: "webMethods API Gateway Service Management REST API"
      authentication:
        type: basic
        username: "{{WEBMETHODS_API_GATEWAY_USER}}"
        password: "{{WEBMETHODS_API_GATEWAY_PASSWORD}}"
      resources:
        - name: apis
          path: /apis
          description: "API lifecycle management operations"
          operations:
            - name: list-apis
              method: GET
              description: "Retrieve all or filtered APIs with pagination"
              inputParameters:
                - name: apiIds
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of API IDs to filter"
                - name: from
                  in: query
                  type: integer
                  required: false
                  description: "Starting index for pagination"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-api
              method: POST
              description: "Create a new API from file, URL, or from scratch"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  apiName: "{{tools.apiName}}"
                  apiVersion: "{{tools.apiVersion}}"
                  apiDescription: "{{tools.apiDescription}}"

        - name: api-by-id
          path: /apis/{apiId}
          description: "Individual API management operations"
          operations:
            - name: get-api
              method: GET
              description: "Fetch a specific API definition"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Export format: swagger, raml, openapi, odata"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-api
              method: PUT
              description: "Update an API definition preserving existing policies"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiName: "{{tools.apiName}}"
                  apiVersion: "{{tools.apiVersion}}"
                  apiDescription: "{{tools.apiDescription}}"
            - name: delete-api
              method: DELETE
              description: "Remove an inactive API from the gateway"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-activate
          path: /apis/{apiId}/activate
          description: "API activation management"
          operations:
            - name: activate-api
              method: PUT
              description: "Expose an API to consumers by activating it"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-deactivate
          path: /apis/{apiId}/deactivate
          description: "API deactivation management"
          operations:
            - name: deactivate-api
              method: PUT
              description: "Hide an API from consumers by deactivating it"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-applications
          path: /apis/{apiId}/applications
          description: "Applications consuming an API"
          operations:
            - name: list-api-applications
              method: GET
              description: "Retrieve all applications registered to consume this API"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-publish
          path: /apis/{apiId}/publish
          description: "API portal publishing"
          operations:
            - name: publish-api
              method: PUT
              description: "Register an API to the webMethods Developer Portal"
              inputParameters:
                - name: apiId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the API"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  portalGatewayId: "{{tools.portalGatewayId}}"
                  communities: "{{tools.communities}}"

  exposes:
    - type: rest
      port: 8100
      namespace: webmethods-gateway-api
      resources:
        - path: /v1/apis
          name: apis
          description: "webMethods API Gateway management"
          operations:
            - method: GET
              name: list-apis
              description: "List all APIs in the gateway"
              call: "webmethods-api-gateway.list-apis"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-api
              description: "Create a new API in the gateway"
              call: "webmethods-api-gateway.create-api"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/apis/{apiId}
          name: api
          description: "Individual API management"
          operations:
            - method: GET
              name: get-api
              description: "Get a specific API"
              call: "webmethods-api-gateway.get-api"
              with:
                apiId: "rest.apiId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: webmethods-gateway-mcp
      transport: http
      tools:
        - name: list-apis
          description: "List all APIs registered in the webMethods API Gateway"
          hints:
            readOnly: true
            openWorld: true
          call: "webmethods-api-gateway.list-apis"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-api
          description: "Get details of a specific API by ID"
          hints:
            readOnly: true
            openWorld: false
          call: "webmethods-api-gateway.get-api"
          with:
            apiId: "tools.apiId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-api
          description: "Create a new API in the webMethods API Gateway"
          hints:
            readOnly: false
            destructive: false
          call: "webmethods-api-gateway.create-api"
          outputParameters:
            - type: object
              mapping: "$."
        - name: activate-api
          description: "Activate an API to expose it to consumers"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "webmethods-api-gateway.activate-api"
          with:
            apiId: "tools.apiId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: publish-api
          description: "Publish an API to the webMethods Developer Portal"
          hints:
            readOnly: false
            destructive: false
          call: "webmethods-api-gateway.publish-api"
          with:
            apiId: "tools.apiId"
          outputParameters:
            - type: object
              mapping: "$."
