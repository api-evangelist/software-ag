aid: software-ag
name: Software AG
description: >-
  Software AG provides enterprise integration and API management through
  webMethods, a platform for connecting applications, processes, and people
  across hybrid cloud and on-premises environments. The webMethods platform
  includes API Gateway, Developer Portal, Integration Server, and cloud-native
  integration services. Software AG was acquired by IBM in 2024.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Management
  - Enterprise Integration
  - iPaaS
  - webMethods
  - Integration Platform
  - API Gateway
url: >-
