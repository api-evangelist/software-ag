  - aid: software-ag:webmethods-developer-portal
    name: webMethods Developer Portal
    description: >-
      The webMethods Developer Portal provides a marketplace for publishing and
      discovering REST, SOAP, and OData APIs for third-party developers and
      partners. It enables developer onboarding, API subscription management,
      and API consumption analytics.
    humanURL: https://www.softwareag.com/en_corporate/resources/api/ds/webmethods-developer-portal.html
    baseURL: https://www.softwareag.com/
    tags:
      - Developer Portal
      - API Management
      - API Marketplace
      - webMethods
    properties:
      - type: Documentation
        url: https://documentation.softwareag.com/webmethods/compendiums/v10-5/C_API_Management/api-mgmt-comp/co-oview_what_is_api_portal.html
      - type: GitHubRepository
        url: https://github.com/SoftwareAG/webmethods-developer-portal

  - aid: software-ag:webmethods-integration-server
    name: webMethods Integration Server
    description: >-
      The webMethods Integration Server is a comprehensive integration platform
      that enables connectivity between enterprise applications, databases,
      legacy systems, and cloud services. It provides flow services, adapters,
      and REST API exposure for business process integration.
    humanURL: https://documentation.softwareag.com/
    baseURL: https://www.softwareag.com/
    tags:
      - Integration
      - Enterprise
      - Middleware
      - webMethods
      - iPaaS
    properties:
      - type: Documentation
        url: https://documentation.softwareag.com/

