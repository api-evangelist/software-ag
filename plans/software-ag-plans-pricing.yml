description: Software AG (now operating its integration business under the IBM/StreamSets/SuperiPaaS realignment
  following the 2024 Adabas/Natural divestiture) does not publish a public price sheet for the webMethods
  product family on softwareag.com. The site directs prospects to Contact Sales / Get in Touch for licensing
  on webMethods Integration Server, API Gateway, and Developer Portal.
sources:
  - https://www.softwareag.com/
notes: softwareag.com/en_corporate/pricing.html returns a 404 page; product pages route to Contact Sales
  / Get in Touch. No tier names or per-call/per-seat prices are publicly published for webMethods. Trimmed
  to one Contact Sales plan; reconciled is false.
plans:
  - id: software-ag-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted Software AG webMethods subscription covering API Gateway, Developer Portal,
      Integration Server, and related modules. Pricing is sized to runtime / cluster footprint, environment
      count, and add-on modules and is provided on request by the Software AG sales team.
    entries:
